# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/pulumi-labs/ci-mgmt
name: "Resync Build Workflows"

on:
  schedule:
    # Once a month on the 5th
    - cron: 0 0 5 * *
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade_provider:
    name: pull-workflow-changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Persist credentials so pull-workflow-changes can push a new branch.
          persist-credentials: true
      - name: Setup mise
        uses: jdx/mise-action@d6e9fb75ae3ee715d1db0b62373f15621d5f7329
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.2.20
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # only saving the cache in the prerequisites job
          cache_save: false
      - name: Regenerate the workflow files via https://github.com/pulumi-labs/ci-mgmt
        run: |
          make ci-mgmt
      - name: Create PR (no linked issue)
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          author: pulumi-bot <bot@pulumi.com>
          base: main
          body:
            This pull request was generated automatically by the resync-build workflow
            in this repository.
          branch: chore/resync-${{ github.run_id }}
          commit-message: Regenerate workflows for pulumi-logfire
          committer: pulumi-bot <bot@pulumi.com>
          labels: impact/no-changelog-required
          title: Regenerate Github Actions workflows for pulumi-logfire
          token: ${{ env.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.PULUMI_PROVIDER_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
